dbs:
  - path: /data/app.db
    replicas:
      - type: s3
        endpoint: ${R2_ENDPOINT} # e.g. https://<account_id>.r2.cloudflarestorage.com
        bucket: ${R2_BUCKET}
        path: sqlite
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
