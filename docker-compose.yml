services:
  app:
    build: .
    restart: unless-stopped
    environment:
      RP_ID: ${RP_ID}
      RP_NAME: ${RP_NAME:-Household Finance OS}
      ORIGIN: ${ORIGIN}
      DB_PATH: /data/app.db
      COOKIE_SECURE: "true"
      PORT: "3000"
    volumes:
      - sqlite-data:/data
    expose:
      - "3000"

  litestream:
    image: litestream/litestream:0.3
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - sqlite-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
    command: replicate

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  sqlite-data:
  caddy-data:
  caddy-config:
